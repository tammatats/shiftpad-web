<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#f4efe7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ShiftPad" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>ShiftPad - iOS Shift Notes</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='8' y='8' width='48' height='48' rx='14' fill='%23e67d59'/%3E%3Cpath d='M20 22h24M20 32h24M20 42h16' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css?v=20260712-hn1" />
  </head>
  <body>
    <div id="auth-gate" class="auth-gate hidden">
      <div class="auth-card">
        <p class="section-kicker">Secure Access</p>
        <h2>Sign in to your ShiftPad</h2>
        <p id="auth-copy" class="helper-copy">Each account gets its own private cloud notes.</p>
        <div id="auth-setup-message" class="auth-setup-message hidden"></div>
        <form id="auth-form" class="auth-form">
          <label class="field-card auth-field">
            <span class="field-label">Email</span>
            <input id="auth-email" type="email" autocomplete="email" required />
          </label>
          <label class="field-card auth-field">
            <span class="field-label">Password</span>
            <input id="auth-password" type="password" autocomplete="current-password" minlength="6" required />
          </label>
          <label class="field-card auth-field">
            <span class="field-label">Display name</span>
            <input id="auth-name" type="text" autocomplete="name" placeholder="Optional for new account" />
          </label>
          <div class="auth-actions-row">
            <button id="auth-signin-btn" class="accent-btn" type="submit">Sign in</button>
            <button id="auth-signup-btn" class="ghost-btn" type="button">Create account</button>
          </div>
          <p id="auth-message" class="auth-message" aria-live="polite"></p>
        </form>
      </div>
    </div>
    <main class="app-shell">
      <section class="phone-frame">
        <div class="top-control-stack">
          <header class="app-header">
            <button id="menu-btn" class="menu-btn header-icon-btn" type="button" aria-label="Open settings" aria-expanded="false">
              <svg class="header-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
                <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.04.04a2 2 0 0 1-2.83 2.83l-.04-.04a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 0 1-4 0v-.06a1.7 1.7 0 0 0-1.02-1.56 1.7 1.7 0 0 0-1.89.34l-.04.04a2 2 0 0 1-2.83-2.83l.04-.04A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 0 1 0-4h.06A1.7 1.7 0 0 0 4.62 8.95a1.7 1.7 0 0 0-.34-1.89l-.04-.04a2 2 0 0 1 2.83-2.83l.04.04a1.7 1.7 0 0 0 1.89.34A1.7 1.7 0 0 0 10 3.02V3a2 2 0 0 1 4 0v.06a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.04-.04a2 2 0 0 1 2.83 2.83l-.04.04a1.7 1.7 0 0 0-.34 1.88 1.7 1.7 0 0 0 1.56 1.03H21a2 2 0 0 1 0 4h-.06A1.7 1.7 0 0 0 19.4 15Z"></path>
              </svg>
            </button>
            <div class="app-title">
              <p id="workspace-eyebrow" class="eyebrow">Shift Note Workspace</p>
              <h1 id="workspace-heading" aria-label="ShiftPad">
                <button id="workspace-switcher" class="workspace-switcher" type="button" aria-label="Switch to DayPad">
                  <span id="workspace-title">ShiftPad</span>
                  <svg class="workspace-switch-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 7h11l-3-3"></path>
                    <path d="m18 7-3 3"></path>
                    <path d="M17 17H6l3 3"></path>
                    <path d="m6 17 3-3"></path>
                  </svg>
                </button>
              </h1>
              <p id="workspace-tagline" class="tagline">Fast handover notes with bed tags and reminders.</p>
            </div>
            <button id="ward-options-btn" class="menu-btn header-options-btn header-icon-btn" type="button" aria-label="Open ward list" aria-expanded="false">
              <svg class="header-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 6h12"></path>
                <path d="M8 12h12"></path>
                <path d="M8 18h12"></path>
                <path d="M4 6h.01"></path>
                <path d="M4 12h.01"></path>
                <path d="M4 18h.01"></path>
              </svg>
            </button>

            <div class="account-actions hidden">
              <div class="account-chip">
                <strong id="account-label">Offline mode</strong>
                <small id="sync-status">Local only</small>
              </div>
              <button id="logout-btn" class="account-logout hidden" type="button">Log out</button>
            </div>
          </header>

          <nav class="view-tabs" aria-label="Views">
            <button id="notes-tab-btn" class="view-tab is-active" type="button" role="tab" data-view="notes">Notes</button>
            <button id="timeline-tab-btn" class="view-tab" type="button" role="tab" data-view="timeline">Summary</button>
            <button id="search-btn" class="view-search-btn" type="button" aria-label="Search all notes" title="Search all notes">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="6.5"></circle>
                <path d="m16 16 4 4"></path>
              </svg>
            </button>
          </nav>

          <div id="sticky-ward-root" class="sticky-ward-root"></div>
        </div>

        <div class="workspace">
          <section class="content-shell">
            <section id="notes-view" class="view-panel">
              <section class="editor-panel notes-editor-panel">
                <div id="editor-root"></div>
              </section>
            </section>

            <section id="timeline-view" class="view-panel hidden">
              <div class="timeline-panel">
                <div class="stack-head">
                  <div>
                    <p class="section-kicker">Summary</p>
                    <h2>Bed information and reminders</h2>
                  </div>
                </div>
                <div id="timeline-root"></div>
              </div>
            </section>
          </section>
        </div>
      </section>
      <div id="drawer-root"></div>
      <div id="bed-action-root"></div>
      <div id="search-root"></div>
    </main>
    <div id="mobile-tag-root"></div>

    <script src="public-config.js" defer></script>
    <script src="/api/public-config.js" defer></script>
    <script src="app.js?v=20260712-hn1" defer></script>
  </body>
</html>
