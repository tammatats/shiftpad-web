<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#f4efe7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ShiftPad" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>ShiftPad - iOS Shift Notes</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='8' y='8' width='48' height='48' rx='14' fill='%23e67d59'/%3E%3Cpath d='M20 22h24M20 32h24M20 42h16' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="auth-gate" class="auth-gate hidden">
      <div class="auth-card">
        <p class="section-kicker">Secure Access</p>
        <h2>Sign in to your ShiftPad</h2>
        <p id="auth-copy" class="helper-copy">Each account gets its own private cloud notes.</p>
        <div id="auth-setup-message" class="auth-setup-message hidden"></div>
        <form id="auth-form" class="auth-form">
          <label class="field-card auth-field">
            <span class="field-label">Email</span>
            <input id="auth-email" type="email" autocomplete="email" required />
          </label>
          <label class="field-card auth-field">
            <span class="field-label">Password</span>
            <input id="auth-password" type="password" autocomplete="current-password" required />
          </label>
          <label class="field-card auth-field">
            <span class="field-label">Display name</span>
            <input id="auth-name" type="text" autocomplete="name" placeholder="Optional for new account" />
          </label>
          <div class="auth-actions-row">
            <button id="auth-signin-btn" class="accent-btn" type="submit">Sign in</button>
            <button id="auth-signup-btn" class="ghost-btn" type="button">Create account</button>
          </div>
          <p id="auth-message" class="auth-message" aria-live="polite"></p>
        </form>
      </div>
    </div>
    <main class="app-shell">
      <section class="phone-frame">
        <header class="app-header">
          <button id="menu-btn" class="menu-btn" type="button" aria-label="Open menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="app-title">
            <p class="eyebrow">Shift Note Workspace</p>
            <h1>ShiftPad</h1>
            <p class="tagline">Fast handover notes with bed tags and reminders.</p>
          </div>

          <div class="account-actions hidden">
            <div class="account-chip">
              <strong id="account-label">Offline mode</strong>
              <small id="sync-status">Local only</small>
            </div>
            <button id="logout-btn" class="account-logout hidden" type="button">Log out</button>
          </div>
        </header>

        <section class="app-toolbar" aria-label="Shift controls">
          <label class="switch-card" for="single-ward-toggle">
            <span>Single-ward shift</span>
            <span class="switch">
              <input id="single-ward-toggle" type="checkbox" />
              <span class="switch-track"></span>
            </span>
          </label>
          <div class="toolbar-actions">
            <button id="add-ward-btn" class="ghost-btn" type="button">Add ward</button>
            <button id="new-note-btn" class="accent-btn" type="button">New note</button>
          </div>
        </section>

        <div class="workspace">
          <aside id="ward-rail" class="ward-rail">
            <div class="rail-head">
              <div>
                <p class="section-kicker">Wards</p>
                <h2>Active lists</h2>
              </div>
              <button id="ward-collapse-btn" class="ghost-btn rail-toggle-btn" type="button" aria-expanded="true">
                Collapse
              </button>
            </div>
            <div id="ward-list" class="ward-list"></div>
          </aside>

          <section class="content-shell">
            <nav class="view-tabs" aria-label="Views">
              <button id="notes-tab-btn" class="view-tab is-active" type="button" data-view="notes">Notes</button>
              <button id="timeline-tab-btn" class="view-tab" type="button" data-view="timeline">Summary</button>
            </nav>

            <section id="notes-view" class="view-panel">
              <section class="editor-panel notes-editor-panel">
                <div id="editor-root"></div>
              </section>
            </section>

            <section id="timeline-view" class="view-panel hidden">
              <div class="timeline-panel">
                <div class="stack-head">
                  <div>
                    <p class="section-kicker">Summary</p>
                    <h2>Bed information and reminders</h2>
                  </div>
                  <div class="timeline-scope-block">
                    <p class="timeline-scope-label">Summary scope</p>
                    <div id="timeline-scope" class="scope-toggle" role="tablist" aria-label="Timeline scope"></div>
                  </div>
                </div>
                <div id="timeline-root"></div>
              </div>
            </section>
          </section>
        </div>
      </section>
      <div id="drawer-root"></div>
    </main>
    <div id="mobile-tag-root"></div>

    <script src="public-config.js"></script>
    <script src="/api/public-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
